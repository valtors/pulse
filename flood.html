<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>38 became 4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060606; color: #e5e5e5;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px; line-height: 1.6;
  min-height: 100vh; overflow-x: hidden;
  position: relative;
}
.prism-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.prism-grid .grid-plane { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; }
.prism-grid .grid-row { display: flex; }
.prism-grid .grid-cell { border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
.prism-grid .lit-cell { position: absolute; pointer-events: none; border-radius: 2px; transition: opacity 1.2s ease-out, transform 1.2s ease-out; }
.click-fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: visible; }
.wrap {
  max-width: 680px; margin: 0 auto;
  padding: 40px 24px 80px;
  position: relative; z-index: 5;
}
.header { text-align: center; margin-bottom: 32px; }
.header h1 {
  font-size: 2.6rem; font-weight: 800;
  letter-spacing: -0.04em; line-height: 1.1;
  margin-bottom: 8px;
}
.header h1 .strike {
  text-decoration: line-through;
  text-decoration-color: #ef4444;
  text-decoration-thickness: 2px; color: #444;
}
.header p { color: #888; font-size: 1rem; }
.counter {
  position: sticky; top: 0;
  background: #060606; padding: 12px 0;
  text-align: center;
  font-family: 'SF Mono', Monaco, monospace;
  z-index: 10; margin-bottom: 12px;
  border-bottom: 1px solid #1a1a1a;
}
.counter .num {
  font-size: 2.5rem; font-weight: 800;
  letter-spacing: -0.03em; line-height: 1;
  display: block; transition: color 0.3s;
}
.counter .label { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
.counter .num.flooding { color: #ef4444; }
.counter .num.filtered { color: #22c55e; }
.flood-zone {
  background: #0a0a0a; border: 1px solid #1a1a1a;
  border-radius: 10px; padding: 12px;
  min-height: 180px; max-height: 440px;
  overflow-y: auto; margin-bottom: 24px;
  position: relative;
  box-shadow: 0 4px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
}
.flood-zone::-webkit-scrollbar { width: 4px; }
.flood-zone::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
.flood-zone::-webkit-scrollbar-track { background: transparent; }
.notif {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-bottom: 1px solid #111;
  font-size: 13px; animation: slideIn 0.25s ease;
  transition: opacity 0.4s, max-height 0.4s, padding 0.4s, margin 0.4s, border  0.4s;
  overflow: hidden; max-height: 60px;
}
.notif:last-child { border-bottom: none; }
.notif .icon {
  width: 32px; height: 32px; border-radius: 6px;
  flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  font-family: 'SF Mono', Monaco, monospace;
}
.notif .icon.urgent { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.notif .icon.important { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
.notif .icon.noise { background: rgba(85,85,85,0.1); color: #555; border: 1px solid rgba(85,85,85,0.1); }
.notif .body { flex: 1; min-width: 0; }
.notif .repo { color: #666; font-size: 11px; font-family: 'SF Mono', Monaco, monospace; }
.notif .title { color: #ccc; font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif.noise-item { opacity: 0.5; }
.notif.noise-item.filtered {
  opacity: 0; max-height: 0;
  padding-top: 0; padding-bottom: 0;
  margin: 0; border-bottom: none;
}
.controls { text-align: center; margin: 24px 0; }
.btn {
  display: inline-block; background: #22c55e; color: #000;
  font-weight: 700; padding: 16px 40px;
  border-radius: 10px; text-decoration: none;
  font-size: 1.1rem; border: none; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
  letter-spacing: -0.01em;
  box-shadow: 0 0 30px rgba(34,197,94,0.2);
}
.btn:hover { opacity: 0.85; transform: scale(1.03); box-shadow: 0 0 50px rgba(34,197,94,0.4); }
.btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; transform: none; box-shadow: none; }
.result {
  text-align: center; margin: 32px 0 16px;
  opacity: 0; transition: opacity 0.6s;
}
.result.show { opacity: 1; }
.result .big {
  font-size: 4rem; font-weight: 800;
  letter-spacing: -0.04em; line-height: 1;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.result .big .from { color: #ef4444; text-decoration: line-through; text-decoration-thickness: 3px; }
.result .big .arrow { color: #333; font-size: 2rem; }
.result .big .to { color: #22c55e; }
.result .sub { color: #888; font-size: 1rem; margin-top: 12px; }
.stat-bar {
  display: flex; gap: 12px; justify-content: center;
  margin: 24px 0; flex-wrap: wrap;
  opacity: 0; transition: opacity 0.6s 0.3s;
}
.stat-bar.show { opacity: 1; }
.stat {
  text-align: center; padding: 16px 24px;
  background: #0a0a0a; border: 1px solid #1a1a1a;
  border-radius: 10px; min-width: 100px;
}
.stat .num { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
.stat .num.urgent { color: #ef4444; }
.stat .num.important { color: #f59e0b; }
.stat .num.noise { color: #333; text-decoration: line-through; }
.stat .label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
.cta { text-align: center; margin-top: 40px; padding-top: 40px; border-top: 1px solid #1a1a1a; }
.cta a {
  color: #22c55e; text-decoration: none;
  font-weight: 700; font-size: 1.1rem;
  border-bottom: 2px solid #22c55e; padding-bottom: 2px;
  transition: opacity 0.2s;
}
.cta a:hover { opacity: 0.7; }
.cta .footer { color: #444; font-size: 0.8rem; margin-top: 16px; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
.counter .num.shaking { animation: shake 0.1s infinite; }
@media (max-width: 600px) {
  .header h1 { font-size: 2rem; }
  .wrap { padding: 30px 16px 60px; }
  .result .big { font-size: 2.8rem; }
  .counter .num { font-size: 2rem; }
  .stat { padding: 12px 16px; min-width: 80px; }
  .stat .num { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div class="prism-grid" id="prismGrid"></div>
<div class="click-fx" id="clickFx"></div>
<div class="wrap">
  <div class="header">
    <h1>your inbox is <span class="strike">fine</span> drowning you.</h1>
    <p>this is what your github notifications look like right now.<br>watch.</p>
  </div>
  <div class="counter" id="counter">
    <span class="num" id="counterNum">0</span>
    <div class="label" id="counterLabel">notifications</div>
  </div>
  <div class="flood-zone" id="flood"></div>
  <div class="controls">
    <button class="btn" id="pulseBtn" onclick="runPulse()" disabled>run pulse</button>
  </div>
  <div class="result" id="result">
    <div class="big"><span class="from">38</span> <span class="arrow">-></span> <span class="to">4</span></div>
    <div class="sub">the rest didn't matter.</div>
  </div>
  <div class="stat-bar" id="stats">
    <div class="stat"><div class="num urgent">2</div><div class="label">urgent</div></div>
    <div class="stat"><div class="num important">2</div><div class="label">needs you</div></div>
    <div class="stat"><div class="num noise">34</div><div class="label">noise</div></div>
  </div>
  <div class="cta">
    <a href="https://github.com/valtors/pulse">get pulse -></a>
    <div class="footer">built with AO. the code is silent, the output speaks.</div>
  </div>
</div>
<script>
const notifications = [
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/observer",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/observer",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"docs: add migration guide from standalone MCP servers to relay (#30)",type:"pr",priority:"urgent"},
  {repo:"valtors/relay",title:"chore(deps): bump anthropics-sdk-go from 1.39.0 to 1.58.0",type:"pr",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"modelcontextprotocol/modelcontextprotocol",title:"handling tool bloat - hundreds of tools",type:"discussion",priority:"urgent"},
  {repo:"AgentWrapper/agent-orchestrator",title:"Daemon status polling has up to 2s stale window after daemon crash",type:"issue",priority:"important"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"AgentWrapper/agent-orchestrator",title:"Superseded review runs keep old agent alive when runtime Cancel fails",type:"issue",priority:"important"},
  {repo:"valtors/observer",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"microsoft/autogen",title:"Pre-action authority receipt for multi-agent delegated work",type:"discussion",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/observer",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"AgentWrapper/agent-orchestrator",title:"Restored session can lose after-start prompt due to race with agent startup",type:"issue",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/reflow",title:"CI workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"valtors/relay",title:"ci workflow run failed for main branch",type:"ci",priority:"noise"},
  {repo:"AgentWrapper/agent-orchestrator",title:"Go workflow run failed for fix/sticky-state-zombie-sessions",type:"ci",priority:"noise"},
];
const flood = document.getElementById('flood');
const counterNum = document.getElementById('counterNum');
const counterLabel = document.getElementById('counterLabel');
const pulseBtn = document.getElementById('pulseBtn');
const result = document.getElementById('result');
const stats = document.getElementById('stats');
let idx = 0, interval;

function addNotif(n) {
  const div = document.createElement('div');
  div.className = 'notif' + (n.priority === 'noise' ? ' noise-item' : '');
  const iconClass = n.priority === 'urgent' ? 'urgent' : n.priority === 'important' ? 'important' : 'noise';
  const iconText = n.type === 'ci' ? 'CI' : n.type === 'pr' ? 'PR' : n.type === 'issue' ? 'IS' : n.type === 'discussion' ? 'DC' : '??';
  div.innerHTML = '<div class="icon ' + iconClass + '">' + iconText + '</div><div class="body"><div class="repo">' + n.repo + '</div><div class="title">' + n.title + '</div></div>';
  flood.appendChild(div);
  flood.scrollTop = flood.scrollHeight;
  counterNum.textContent = idx + 1;
  if (idx >= 20) counterNum.classList.add('flooding', 'shaking');
  if (idx >= 38) {
    clearInterval(interval);
    pulseBtn.disabled = false;
    counterNum.classList.remove('shaking');
    counterNum.classList.add('flooding');
    counterLabel.textContent = 'drowning';
  }
}

function startFlood() {
  interval = setInterval(function() {
    if (idx < notifications.length) { addNotif(notifications[idx]); idx++; }
  }, 150);
}

function sniperBurst(x, y) {
  var fx = document.getElementById('clickFx');
  var color = '#22c55e', sz = 160, sw = 3;
  var g = document.createElement('div');
  g.style.cssText = 'position:absolute;left:' + (x-sz/2) + 'px;top:' + (y-sz/2) + 'px;width:' + sz + 'px;height:' + sz + 'px';
  var ring = document.createElement('div');
  ring.style.cssText = 'position:absolute;left:' + (sz/2-25) + 'px;top:' + (sz/2-25) + 'px;width:50px;height:50px;border:2px solid ' + color + ';border-radius:50%;opacity:0.9;transform:scale(0.3);transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1),opacity 0.5s ease-out';
  g.appendChild(ring); setTimeout(function() { ring.style.transform = 'scale(3)'; ring.style.opacity = '0'; }, 10);
  var ring2 = document.createElement('div');
  ring2.style.cssText = 'position:absolute;left:' + (sz/2-15) + 'px;top:' + (sz/2-15) + 'px;width:30px;height:30px;border:1px solid ' + color + ';border-radius:50%;opacity:0.6;transform:scale(0.3);transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1) 0.1s,opacity 0.4s ease-out 0.1s';
  g.appendChild(ring2); setTimeout(function() { ring2.style.transform = 'scale(3.5)'; ring2.style.opacity = '0'; }, 10);
  for (var a = 0; a < 16; a++) {
    var angle = a * Math.PI / 8;
    var dot = document.createElement('div');
    dot.style.cssText = 'position:absolute;left:' + (sz/2-sw/2) + 'px;top:' + (sz/2-sw/2) + 'px;width:' + sw + 'px;height:' + sw + 'px;background:' + color + ';border-radius:50%;transform:translate(0,0);transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1) ' + (a*0.01) + 's,opacity 0.5s ease-out 0.2s,width 0.5s ease-out 0.2s,height 0.5s ease-out 0.2s';
    g.appendChild(dot);
    (function(d, ang) { setTimeout(function() { d.style.transform = 'translate(' + (Math.cos(ang)*sz*0.48) + 'px,' + (Math.sin(ang)*sz*0.48) + 'px)'; d.style.opacity = '0'; d.style.width = '0px'; d.style.height = '0px'; }, 10); })(dot, angle);
  }
  fx.appendChild(g);
  setTimeout(function() { if (g.parentNode) g.parentNode.removeChild(g); }, 800);
}

function runPulse() {
  var rect = pulseBtn.getBoundingClientRect();
  sniperBurst(rect.left + rect.width/2, rect.top + rect.height/2);
  pulseBtn.disabled = true;
  pulseBtn.textContent = 'filtering...';
  pulseBtn.style.background = '#1a1a1a';
  pulseBtn.style.color = '#22c55e';
  counterNum.classList.remove('flooding');
  counterNum.classList.add('filtered');
  counterLabel.textContent = 'that matter';
  const noiseItems = flood.querySelectorAll('.noise-item');
  let filtered = 0;
  noiseItems.forEach(function(item, i) {
    setTimeout(function() {
      item.classList.add('filtered');
      filtered++;
      counterNum.textContent = 38 - filtered;
    }, i * 30);
  });
  setTimeout(function() {
    counterNum.textContent = '4';
    pulseBtn.style.display = 'none';
    result.classList.add('show');
    stats.classList.add('show');
  }, noiseItems.length * 30 + 400);
}

startFlood();

(function(){var g=document.getElementById("prismGrid");if(!g)return;var bs=50,colors=["rgba(34,197,94,0.25)","rgba(0,173,216,0.25)","rgba(168,85,247,0.25)","rgba(239,68,68,0.25)","rgba(99,102,241,0.25)"],lit=null;function build(){var w=window.innerWidth,h=Math.max(window.innerHeight,document.body.scrollHeight),c=Math.ceil(w/bs),r=Math.ceil(h/bs);g.innerHTML="";var p=document.createElement("div");p.className="grid-plane";p.style.width=(c*bs)+"px";p.style.height=(r*bs)+"px";for(var i=0;i<r;i++){var row=document.createElement("div");row.className="grid-row";for(var j=0;j<c;j++){var cell=document.createElement("div");cell.className="grid-cell";cell.style.width=bs+"px";cell.style.height=bs+"px";row.appendChild(cell);}p.appendChild(row);}g.appendChild(p);}document.addEventListener("pointermove",function(e){var rect=g.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top,col=Math.floor(x/bs),row=Math.floor(y/bs);if(col<0||row<0)return;if(lit&&lit.row===row&&lit.col===col)return;if(lit){lit.el.style.opacity="0";lit.el.style.transform="scale(0.5)";var o=lit;setTimeout(function(){if(o.el.parentNode)o.el.parentNode.removeChild(o.el);},1200);}var el=document.createElement("div");el.className="lit-cell";el.style.cssText="left:"+(col*bs)+"px;top:"+(row*bs)+"px;width:"+bs+"px;height:"+bs+"px;background:"+colors[Math.floor(Math.random()*colors.length)]+";opacity:1;transform:scale(1)";g.appendChild(el);lit={row:row,col:col,el:el};});build();var rt;window.addEventListener("resize",function(){clearTimeout(rt);rt=setTimeout(build,200);});})();
</script>
<script>
(function(){var fx=document.getElementById("clickFx"),colors=["#22c55e","#00add8","#a855f7","#ef4444"];document.addEventListener("click",function(e){var x=e.clientX,y=e.clientY,color=colors[Math.floor(Math.random()*colors.length)],sz=100,sw=3,g=document.createElement("div");g.style.cssText="position:absolute;left:"+(x-sz/2)+"px;top:"+(y-sz/2)+"px;width:"+sz+"px;height:"+sz+"px";for(var a=0;a<12;a++){var angle=a*Math.PI/6,dot=document.createElement("div");dot.style.cssText="position:absolute;left:"+(sz/2-sw/2)+"px;top:"+(sz/2-sw/2)+"px;width:"+sw+"px;height:"+sw+"px;background:"+color+";border-radius:50%;transform:translate(0,0);transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1),opacity 0.5s ease-out 0.2s,width 0.5s ease-out 0.2s,height 0.5s ease-out 0.2s";g.appendChild(dot);(function(d,ang){setTimeout(function(){d.style.transform="translate("+Math.cos(ang)*sz*0.45+"px,"+Math.sin(ang)*sz*0.45+"px)";d.style.opacity="0";d.style.width="0px";d.style.height="0px";},10);})(dot,angle);}var ring=document.createElement("div");ring.style.cssText="position:absolute;left:"+(sz/2-20)+"px;top:"+(sz/2-20)+"px;width:40px;height:40px;border:2px solid "+color+";border-radius:50%;opacity:0.8;transform:scale(0.3);transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1),opacity 0.4s ease-out";g.appendChild(ring);setTimeout(function(){ring.style.transform="scale(2.5)";ring.style.opacity="0";},10);fx.appendChild(g);setTimeout(function(){if(g.parentNode)g.parentNode.removeChild(g);},700);});})();
</script>
</body>
</html>
